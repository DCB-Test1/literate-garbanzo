name: APP DEBUG
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-vnc-desktop
  cancel-in-progress: true

jobs:
  macos-vnc:
    # Important: use macos-14 for this TCC method.
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show macOS environment
        shell: bash
        run: |
          echo "=== macOS ==="
          sw_vers

          echo
          echo "=== SIP ==="
          csrutil status || true

          echo
          echo "=== Console user ==="
          scutil <<< "show State:/Users/ConsoleUser" || true

          echo
          echo "=== WindowServer ==="
          pgrep -laf WindowServer || true

          echo
          echo "=== Xcode ==="
          xcodebuild -version
          xcode-select -p

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Enable Screen Sharing through TCC
        shell: bash
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${VNC_PASSWORD:-}" ]]; then
            echo "::error::VNC_PASSWORD secret is missing."
            exit 1
          fi

          echo "::add-mask::$VNC_PASSWORD"

          python3 <<'PY'
          import os
          import sys

          password = os.environ.get("VNC_PASSWORD", "")

          try:
              encoded = password.encode("ascii")
          except UnicodeEncodeError:
              print("::error::VNC_PASSWORD must use ASCII characters only.")
              sys.exit(1)

          if len(encoded) != 8:
              print(
                  "::error::VNC_PASSWORD must be exactly "
                  f"8 ASCII characters, received {len(encoded)}."
              )
              sys.exit(1)

          print("VNC password validation passed.")
          PY

          DB="/Library/Application Support/com.apple.TCC/TCC.db"
          SCREENSHARING_PLIST="/System/Library/LaunchDaemons/com.apple.screensharing.plist"
          KICKSTART="/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart"

          echo
          echo "=== Testing system TCC database access ==="

          if [[ ! -f "$DB" ]]; then
            echo "::error::System TCC database was not found."
            exit 1
          fi

          # Verify that GitHub's runner permits writing to the system TCC DB.
          sudo sqlite3 "$DB" "
            BEGIN IMMEDIATE;
            UPDATE access
            SET auth_value = auth_value
            WHERE client = '/bin/bash'
              AND service = 'kTCCServiceScreenCapture';
            ROLLBACK;
          "

          echo "System TCC database is writable."

          echo
          echo "=== Loading Screen Sharing service ==="

          # This may say the service is already loaded; that is harmless.
          sudo launchctl load -w "$SCREENSHARING_PLIST" 2>/dev/null || true
          sudo launchctl enable system/com.apple.screensharing || true

          EPOCH="$(date +%s)"

          echo
          echo "=== Granting Screen Sharing TCC permissions ==="

          # These are the two permissions normally added by Apple's
          # EnableRemoteDesktop MDM command.
          #
          # Explicit column names make this work with the expanded macOS 14
          # TCC schema.
          sudo sqlite3 "$DB" <<SQL
          BEGIN IMMEDIATE;

          DELETE FROM access
          WHERE client = 'com.apple.screensharing.agent'
            AND service IN (
              'kTCCServicePostEvent',
              'kTCCServiceScreenCapture'
            );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServicePostEvent',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServiceScreenCapture',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          COMMIT;
          SQL

          echo
          echo "=== Installed TCC entries ==="

          sudo sqlite3 -header -column "$DB" "
            SELECT
              service,
              client,
              client_type,
              auth_value,
              auth_reason,
              last_modified
            FROM access
            WHERE client = 'com.apple.screensharing.agent';
          "

          # Force TCC to reload its database.
          echo
          echo "=== Restarting TCC daemons ==="

          sudo killall tccd 2>/dev/null || true
          killall tccd 2>/dev/null || true
          sleep 4

          echo
          echo "=== Configuring Apple VNC authentication ==="

          if [[ ! -x "$KICKSTART" ]]; then
            echo "::error::Apple Remote Desktop kickstart was not found."
            exit 1
          fi

          sudo "$KICKSTART" -deactivate || true

          sudo "$KICKSTART" \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvnclegacy \
            -vnclegacy yes

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvncpw \
            -vncpw "$VNC_PASSWORD"

          sudo "$KICKSTART" -restart -agent

          # Restart both Screen Sharing and Remote Management components.
          sudo launchctl kickstart -k system/com.apple.screensharing 2>/dev/null || true
          sudo killall ARDAgent 2>/dev/null || true

          sleep 8

          echo
          echo "=== Checking VNC port ==="

          for attempt in {1..20}; do
            if nc -z 127.0.0.1 5900; then
              echo "VNC is listening on TCP port 5900."
              break
            fi

            if [[ "$attempt" -eq 20 ]]; then
              echo "::error::VNC did not start on port 5900."
              sudo lsof -nP -iTCP:5900 || true
              exit 1
            fi

            echo "Waiting for VNC: attempt $attempt/20"
            sleep 2
          done

          echo
          echo "=== VNC processes ==="
          ps aux | grep -Ei \
            "screensharing|ARDAgent|remotemanagement" \
            | grep -v grep \
            || true

          echo
          echo "=== Port listener ==="
          sudo lsof -nP -iTCP:5900 -sTCP:LISTEN || true

      - name: Open Xcode and Simulator
        shell: bash
        run: |
          if [[ -d "$GITHUB_WORKSPACE/ios/Runner.xcworkspace" ]]; then
            open -a Xcode "$GITHUB_WORKSPACE/ios/Runner.xcworkspace" || true
          elif [[ -d "$GITHUB_WORKSPACE/ios/Runner.xcodeproj" ]]; then
            open -a Xcode "$GITHUB_WORKSPACE/ios/Runner.xcodeproj" || true
          else
            open -a Xcode || true
          fi

          open -a Simulator || true
          open -a Finder || true

          sleep 10

      - name: Capture desktop test screenshot
        shell: bash
        run: |
          screencapture -x "$RUNNER_TEMP/macos-desktop.png" || true
          ls -lh "$RUNNER_TEMP/macos-desktop.png" || true

      - name: Upload desktop test screenshot
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-test
          path: ${{ runner.temp }}/macos-desktop.png
          if-no-files-found: warn

      - name: Print VNC details
        shell: bash
        run: |
          set -Eeuo pipefail

          TS_IP="$(tailscale ip -4 | head -n 1)"

          if [[ -z "$TS_IP" ]]; then
            echo "::error::Could not determine Tailscale IPv4 address."
            tailscale status || true
            exit 1
          fi

          echo
          echo "================================================"
          echo " MACOS VNC DESKTOP"
          echo "================================================"
          echo "Server   : ${TS_IP}:5900"
          echo "Protocol : VNC"
          echo "Username : leave blank"
          echo "Password : your VNC_PASSWORD GitHub secret"
          echo "================================================"

          {
            echo "## macOS VNC desktop"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Server | \`${TS_IP}:5900\` |"
            echo "| Protocol | VNC |"
            echo "| Username | Leave blank |"
            echo "| Password | Value stored in \`VNC_PASSWORD\` |"
            echo "| Runner | \`macos-14\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Keep macOS running
        shell: bash
        run: |
          caffeinate -dimsu &
          CAFFEINATE_PID=$!

          cleanup() {
            kill "$CAFFEINATE_PID" 2>/dev/null || true
          }

          trap cleanup EXIT INT TERM

          echo "macOS VNC is active."
          echo "Cancel the workflow when finished."

          while true; do
            echo "VNC alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            sleep 300
          done

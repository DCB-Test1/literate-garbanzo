name: mac

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mac
  cancel-in-progress: true

jobs:
  macos-desktop:
    runs-on: macos-14
    timeout-minutes: 180

    env:
      VNC_PORT: "5900"
      NOVNC_PORT: "6080"

      # Lower values reduce bandwidth and improve responsiveness.
      NOVNC_QUALITY: "3"
      NOVNC_COMPRESSION: "2"

      # The workflow tries these resolutions in order.
      TARGET_RESOLUTION: "1280x800"

      # Temporary GUI administrator account.
      MAC_ADMIN_USER: "macadmin"

    steps:
      # =========================================================
      # ENVIRONMENT
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show macOS environment
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== macOS ==="
          sw_vers

          echo
          echo "=== Architecture ==="
          uname -m

          echo
          echo "=== SIP ==="
          csrutil status || true

          echo
          echo "=== Current user ==="
          whoami
          id

          echo
          echo "=== Console session ==="
          scutil <<< "show State:/Users/ConsoleUser" || true

          echo
          echo "=== WindowServer ==="
          pgrep -laf WindowServer || true

          echo
          echo "=== Xcode ==="
          xcodebuild -version
          xcode-select -p

      # =========================================================
      # TEMPORARY ADMINISTRATOR
      # =========================================================
      - name: Create temporary macadmin account
        shell: bash
        env:
          MAC_ADMIN_PASSWORD_SECRET: ${{ secrets.MAC_ADMIN_PASSWORD }}
        run: |
          set -Eeuo pipefail

          ADMIN_USER="$MAC_ADMIN_USER"

          # When MAC_ADMIN_PASSWORD is not configured, use macadmin.
          ADMIN_PASSWORD="${MAC_ADMIN_PASSWORD_SECRET:-macadmin}"

          echo "::add-mask::$ADMIN_PASSWORD"

          echo "Creating temporary administrator: $ADMIN_USER"

          if id "$ADMIN_USER" >/dev/null 2>&1; then
            echo "Removing an existing temporary account..."
            sudo sysadminctl \
              -deleteUser "$ADMIN_USER" \
              2>/dev/null || true

            sleep 2
          fi

          sudo sysadminctl \
            -addUser "$ADMIN_USER" \
            -fullName "Temporary Mac Administrator" \
            -password "$ADMIN_PASSWORD" \
            -admin

          sudo dseditgroup \
            -o edit \
            -a "$ADMIN_USER" \
            -t user \
            admin

          sudo createhomedir \
            -c \
            -u "$ADMIN_USER" \
            >/dev/null 2>&1 || true

          echo "Testing administrator credentials..."

          if ! sudo dscl . \
            -authonly \
            "$ADMIN_USER" \
            "$ADMIN_PASSWORD"; then

            echo "::error::Temporary administrator authentication failed."
            exit 1
          fi

          echo
          echo "=============================================="
          echo " TEMPORARY ADMINISTRATOR READY"
          echo "=============================================="
          echo "Username : $ADMIN_USER"
          echo "Password : MAC_ADMIN_PASSWORD secret"
          echo "           or 'macadmin' when secret is absent"
          echo "=============================================="

          {
            echo "## Temporary administrator"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Username | \`$ADMIN_USER\` |"
            echo "| Password | \`MAC_ADMIN_PASSWORD\` secret, or \`macadmin\` when unset |"
            echo
            echo "Use this account in macOS installer authorization dialogs."
          } >> "$GITHUB_STEP_SUMMARY"

      # =========================================================
      # REQUIRED UTILITIES
      # =========================================================
      - name: Install Cloudflare and display tools
        shell: bash
        run: |
          set -Eeuo pipefail

          export HOMEBREW_NO_ENV_HINTS=1

          PACKAGES=()

          if ! command -v cloudflared >/dev/null 2>&1; then
            PACKAGES+=("cloudflared")
          fi

          if ! command -v displayplacer >/dev/null 2>&1; then
            PACKAGES+=("displayplacer")
          fi

          if [[ "${#PACKAGES[@]}" -gt 0 ]]; then
            brew install "${PACKAGES[@]}"
          fi

          echo
          echo "=== cloudflared ==="
          cloudflared --version

          echo
          echo "=== displayplacer ==="
          displayplacer list | head -n 80 || true

      # =========================================================
      # PERFORMANCE OPTIMIZATION
      # =========================================================
      - name: Optimize macOS for remote desktop
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Disabling bandwidth-heavy macOS animations..."

          defaults write NSGlobalDomain \
            NSAutomaticWindowAnimationsEnabled \
            -bool false || true

          defaults write NSGlobalDomain \
            NSWindowResizeTime \
            -float 0.001 || true

          defaults write NSGlobalDomain \
            NSScrollAnimationEnabled \
            -bool false || true

          defaults write NSGlobalDomain \
            NSUseAnimatedFocusRing \
            -bool false || true

          defaults write com.apple.dock \
            launchanim \
            -bool false || true

          defaults write com.apple.dock \
            expose-animation-duration \
            -float 0.05 || true

          defaults write com.apple.dock \
            autohide-time-modifier \
            -float 0.05 || true

          defaults write com.apple.finder \
            DisableAllAnimations \
            -bool true || true

          defaults write com.apple.universalaccess \
            reduceMotion \
            -bool true || true

          defaults write com.apple.universalaccess \
            reduceTransparency \
            -bool true || true

          killall Dock 2>/dev/null || true
          killall Finder 2>/dev/null || true
          killall SystemUIServer 2>/dev/null || true

          sleep 3

      - name: Reduce virtual display resolution
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== Display configuration before optimization ==="

          DISPLAY_INFO="$(displayplacer list)"
          printf '%s\n' "$DISPLAY_INFO"

          SCREEN_ID="$(
            printf '%s\n' "$DISPLAY_INFO" |
            awk -F': ' '
              /Contextual screen id:/ {
                print $2
                exit
              }
            '
          )"

          if [[ -z "$SCREEN_ID" ]]; then
            SCREEN_ID="$(
              printf '%s\n' "$DISPLAY_INFO" |
              awk -F': ' '
                /Persistent screen id:/ {
                  print $2
                  exit
                }
              '
            )"
          fi

          if [[ -z "$SCREEN_ID" ]]; then
            echo "::warning::Unable to identify the virtual display."
            echo "::warning::Continuing with the existing resolution."
            exit 0
          fi

          echo
          echo "Screen ID: $SCREEN_ID"

          RESOLUTION_CHANGED=0

          # Prefer 1280x800. Fall back to other low-bandwidth sizes.
          for RESOLUTION in \
            "$TARGET_RESOLUTION" \
            "1280x720" \
            "1024x768" \
            "1440x900"; do

            if ! printf '%s\n' "$DISPLAY_INFO" |
              grep -q "res:${RESOLUTION}"; then
              echo "Resolution ${RESOLUTION} is not advertised."
              continue
            fi

            echo "Trying resolution ${RESOLUTION}..."

            if displayplacer \
              "id:${SCREEN_ID} res:${RESOLUTION} scaling:off origin:(0,0) degree:0"; then

              echo "Display changed to ${RESOLUTION}."
              RESOLUTION_CHANGED=1

              echo "ACTIVE_RESOLUTION=$RESOLUTION" >> "$GITHUB_ENV"
              break
            fi
          done

          if [[ "$RESOLUTION_CHANGED" -ne 1 ]]; then
            echo "::warning::Could not apply a lower resolution."
            echo "::warning::Continuing with the current display mode."
            echo "ACTIVE_RESOLUTION=current" >> "$GITHUB_ENV"
          fi

          sleep 5

          echo
          echo "=== Display configuration after optimization ==="

          displayplacer list | head -n 80 || true

      # =========================================================
      # MACOS SCREEN SHARING / VNC
      # =========================================================
      - name: Configure macOS Screen Sharing
        shell: bash
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${VNC_PASSWORD:-}" ]]; then
            echo "::error::VNC_PASSWORD GitHub secret is missing."
            exit 1
          fi

          echo "::add-mask::$VNC_PASSWORD"

          python3 <<'PY'
          import os
          import sys

          password = os.environ.get("VNC_PASSWORD", "")

          try:
              raw = password.encode("ascii")
          except UnicodeEncodeError:
              print(
                  "::error::VNC_PASSWORD must contain ASCII "
                  "characters only."
              )
              sys.exit(1)

          if len(raw) != 8:
              print(
                  "::error::VNC_PASSWORD must be exactly 8 ASCII "
                  f"characters. Received {len(raw)} bytes."
              )
              sys.exit(1)

          print("VNC password validation passed.")
          PY

          sudo -n true

          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"

          KICKSTART="/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart"

          SCREENSHARING_PLIST="/System/Library/LaunchDaemons/com.apple.screensharing.plist"

          if [[ ! -f "$TCC_DB" ]]; then
            echo "::error::System TCC database was not found."
            exit 1
          fi

          if [[ ! -x "$KICKSTART" ]]; then
            echo "::error::Apple Remote Desktop kickstart was not found."
            exit 1
          fi

          echo
          echo "=== Testing TCC database access ==="

          sudo sqlite3 "$TCC_DB" "
            BEGIN IMMEDIATE;

            UPDATE access
            SET auth_value = auth_value
            WHERE client = 'com.apple.screensharing.agent';

            ROLLBACK;
          "

          echo "System TCC database is writable."

          echo
          echo "=== Loading Screen Sharing service ==="

          sudo launchctl enable \
            system/com.apple.screensharing || true

          sudo launchctl bootstrap \
            system \
            "$SCREENSHARING_PLIST" \
            2>/dev/null || true

          EPOCH="$(date +%s)"

          echo
          echo "=== Granting Screen Sharing permissions ==="

          sudo sqlite3 "$TCC_DB" <<SQL
          BEGIN IMMEDIATE;

          DELETE FROM access
          WHERE client = 'com.apple.screensharing.agent'
            AND service IN (
              'kTCCServicePostEvent',
              'kTCCServiceScreenCapture'
            );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServicePostEvent',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServiceScreenCapture',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          COMMIT;
          SQL

          echo
          echo "=== Installed TCC permissions ==="

          sudo sqlite3 \
            -header \
            -column \
            "$TCC_DB" "
              SELECT
                service,
                client,
                client_type,
                auth_value,
                auth_reason,
                last_modified
              FROM access
              WHERE client = 'com.apple.screensharing.agent';
            "

          echo
          echo "=== Restarting TCC ==="

          sudo killall tccd 2>/dev/null || true
          killall tccd 2>/dev/null || true

          sleep 3

          echo
          echo "=== Stopping previous Screen Sharing processes ==="

          sudo "$KICKSTART" -deactivate || true
          sudo killall ARDAgent 2>/dev/null || true
          sudo killall ScreensharingAgent 2>/dev/null || true
          sudo killall screensharingd 2>/dev/null || true

          sleep 3

          echo
          echo "=== Activating Remote Management ==="

          sudo "$KICKSTART" \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all

          echo
          echo "=== Enabling legacy VNC authentication ==="

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvnclegacy \
            -vnclegacy yes

          echo
          echo "=== Setting VNC password ==="

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvncpw \
            -vncpw "$VNC_PASSWORD"

          echo
          echo "=== Writing Remote Management preferences ==="

          sudo defaults write \
            /Library/Preferences/com.apple.RemoteManagement \
            VNCLegacyConnectionsEnabled \
            -bool true

          sudo defaults write \
            /Library/Preferences/com.apple.RemoteManagement \
            ScreenSharingReqPermEnabled \
            -bool false

          sudo defaults write \
            /Library/Preferences/com.apple.RemoteManagement \
            VNCAlwaysStartOnConsole \
            -bool true

          echo
          echo "=== Starting Screen Sharing ==="

          sudo launchctl enable \
            system/com.apple.screensharing || true

          sudo launchctl kickstart \
            -k \
            system/com.apple.screensharing \
            2>/dev/null || true

          sudo "$KICKSTART" -restart -agent -console || \
            sudo "$KICKSTART" -restart -agent || true

          echo
          echo "=== Waiting for VNC port ${VNC_PORT} ==="

          VNC_READY=0

          for ATTEMPT in 1 2 3; do
            if nc -z 127.0.0.1 "$VNC_PORT"; then
              VNC_READY=1
              echo "VNC is listening on localhost:${VNC_PORT}."
              break
            fi

            echo "Attempt ${ATTEMPT}/3: waiting for VNC..."
            sleep 10
          done

          if [[ "$VNC_READY" -ne 1 ]]; then
            echo "::error::VNC did not start after 3 attempts."

            echo
            echo "=== Screen Sharing processes ==="

            ps aux |
              grep -Ei "ARDAgent|Screen.?sharing|AppleVNC" |
              grep -v grep || true

            echo
            echo "=== Listening ports ==="

            sudo lsof -nP -iTCP -sTCP:LISTEN || true

            exit 1
          fi

          echo
          echo "=== VNC listener ==="

          sudo lsof \
            -nP \
            -iTCP:"$VNC_PORT" \
            -sTCP:LISTEN || true

      # =========================================================
      # VERIFY VNC AUTHENTICATION
      # =========================================================
      - name: Verify VNC authentication types
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          import socket
          import sys


          def receive_exact(sock: socket.socket, length: int) -> bytes:
              result = bytearray()

              while len(result) < length:
                  chunk = sock.recv(length - len(result))

                  if not chunk:
                      raise RuntimeError(
                          "VNC connection closed unexpectedly."
                      )

                  result.extend(chunk)

              return bytes(result)


          with socket.create_connection(
              ("127.0.0.1", 5900),
              timeout=10,
          ) as sock:
              banner = receive_exact(sock, 12)

              print("Server VNC banner:", repr(banner))

              if not banner.startswith(b"RFB "):
                  print("::error::Invalid VNC protocol banner.")
                  sys.exit(1)

              sock.sendall(b"RFB 003.008\n")

              security_count = receive_exact(sock, 1)[0]

              if security_count == 0:
                  reason_length = int.from_bytes(
                      receive_exact(sock, 4),
                      byteorder="big",
                  )

                  reason = receive_exact(
                      sock,
                      reason_length,
                  ).decode(
                      "utf-8",
                      errors="replace",
                  )

                  print(
                      "::error::VNC security negotiation failed: "
                      f"{reason}"
                  )
                  sys.exit(1)

              security_types = list(
                  receive_exact(sock, security_count)
              )

              print("Advertised security types:", security_types)
              print("Type 2  = standard VNC password")
              print("Type 30 = Apple Remote Desktop")

              if 2 not in security_types:
                  print(
                      "::error::Standard VNC authentication type 2 "
                      "was not advertised."
                  )
                  sys.exit(1)

              print("Standard VNC password authentication is available.")
          PY

      - name: Verify desktop capture
        shell: bash
        run: |
          set -Eeuo pipefail

          SCREENSHOT="$RUNNER_TEMP/macos-desktop.png"

          screencapture -x "$SCREENSHOT"

          if [[ ! -s "$SCREENSHOT" ]]; then
            echo "::error::Desktop screenshot was not created."
            exit 1
          fi

          echo "Desktop screenshot created:"
          ls -lh "$SCREENSHOT"
          file "$SCREENSHOT"

      # =========================================================
      # INSTALL AND PATCH NOVNC
      # =========================================================
      - name: Install and patch noVNC
        shell: bash
        run: |
          set -Eeuo pipefail

          NOVNC_DIR="$RUNNER_TEMP/noVNC"

          NOVNC_COMMIT="63107bd06d9e1f6136ff21aeda8cd62cbf0d433e"
          NOVNC_REPOSITORY="https://github.com/novnc/noVNC.git"

          rm -rf "$NOVNC_DIR"
          mkdir -p "$NOVNC_DIR"

          echo "Downloading pinned noVNC commit:"
          echo "$NOVNC_COMMIT"

          git -C "$NOVNC_DIR" init
          git -C "$NOVNC_DIR" remote add \
            origin \
            "$NOVNC_REPOSITORY"

          git -C "$NOVNC_DIR" fetch \
            --depth=1 \
            origin \
            "$NOVNC_COMMIT"

          git -C "$NOVNC_DIR" checkout \
            --detach \
            FETCH_HEAD

          echo
          echo "=== Installed noVNC version ==="

          git -C "$NOVNC_DIR" log -1 --oneline

          NOVNC_RFB="$NOVNC_DIR/core/rfb.js"

          if [[ ! -f "$NOVNC_RFB" ]]; then
            echo "::error::Missing noVNC source: $NOVNC_RFB"
            exit 1
          fi

          echo
          echo "Patching noVNC to prefer standard VNC authentication..."

          NOVNC_RFB="$NOVNC_RFB" python3 <<'PY'
          import os
          import sys
          from pathlib import Path


          path = Path(os.environ["NOVNC_RFB"])
          source = path.read_text(encoding="utf-8")

          method_start_marker = "_negotiateSecurity() {"
          method_end_marker = "_handleSecurityReason() {"

          method_start = source.find(method_start_marker)

          if method_start == -1:
              print(
                  "::error::Could not locate "
                  "_negotiateSecurity() in noVNC."
              )
              sys.exit(1)

          method_end = source.find(
              method_end_marker,
              method_start,
          )

          if method_end == -1:
              print(
                  "::error::Could not locate the end of "
                  "_negotiateSecurity()."
              )
              sys.exit(1)

          selection_start = source.find(
              "// Look for a matching security type",
              method_start,
              method_end,
          )

          if selection_start == -1:
              print(
                  "::error::Could not locate noVNC's main "
                  "security-selection block."
              )
              sys.exit(1)

          selection_start = source.rfind(
              "\n",
              method_start,
              selection_start,
          ) + 1

          selection_end_marker = (
              "        if (this._rfbAuthScheme === -1) {"
          )

          selection_end = source.find(
              selection_end_marker,
              selection_start,
              method_end,
          )

          if selection_end == -1:
              print(
                  "::error::Could not locate noVNC's "
                  "security-selection ending."
              )
              sys.exit(1)

          replacement = """        // Prefer classic VNC password authentication.
                  //
                  // Apple normally advertises Apple Remote Desktop
                  // authentication before standard VNC authentication.
                  this._rfbAuthScheme = -1;

                  if (Array.from(types).includes(securityTypeVNCAuth)) {
                      this._rfbAuthScheme = securityTypeVNCAuth;
                  } else {
                      for (let type of types) {
                          if (this._isSupportedSecurityType(type)) {
                              this._rfbAuthScheme = type;
                              break;
                          }
                      }
                  }

          """

          patched = (
              source[:selection_start]
              + replacement
              + source[selection_end:]
          )

          if patched == source:
              print("::error::noVNC source was not modified.")
              sys.exit(1)

          path.write_text(
              patched,
              encoding="utf-8",
          )

          print("noVNC authentication patch applied.")
          PY

          echo
          echo "=== Confirming authentication patch ==="

          grep \
            -n \
            -A20 \
            -B5 \
            "Prefer classic VNC password authentication" \
            "$NOVNC_RFB"

          echo
          echo "=== Checking JavaScript syntax ==="

          node --check "$NOVNC_RFB"

          echo "NOVNC_DIR=$NOVNC_DIR" >> "$GITHUB_ENV"

      # =========================================================
      # START NOVNC
      # =========================================================
      - name: Start optimized noVNC
        shell: bash
        run: |
          set -Eeuo pipefail

          nohup "$NOVNC_DIR/utils/novnc_proxy" \
            --listen "127.0.0.1:${NOVNC_PORT}" \
            --vnc "127.0.0.1:${VNC_PORT}" \
            > "$RUNNER_TEMP/novnc.log" \
            2>&1 &

          NOVNC_PID=$!

          echo "NOVNC_PID=$NOVNC_PID" >> "$GITHUB_ENV"
          echo "$NOVNC_PID" > "$RUNNER_TEMP/novnc.pid"

          NOVNC_READY=0

          for ATTEMPT in 1 2 3; do
            if curl \
              --silent \
              --fail \
              "http://127.0.0.1:${NOVNC_PORT}/vnc.html" \
              >/dev/null; then

              NOVNC_READY=1
              echo "noVNC is ready."
              break
            fi

            if ! kill -0 "$NOVNC_PID" 2>/dev/null; then
              echo "::error::noVNC stopped unexpectedly."
              cat "$RUNNER_TEMP/novnc.log" || true
              exit 1
            fi

            echo "Attempt ${ATTEMPT}/3: waiting for noVNC..."
            sleep 5
          done

          if [[ "$NOVNC_READY" -ne 1 ]]; then
            echo "::error::noVNC did not start after 3 attempts."
            cat "$RUNNER_TEMP/novnc.log" || true
            exit 1
          fi

      # =========================================================
      # START CLOUDFLARE QUICK TUNNEL
      # =========================================================
      - name: Start Cloudflare Quick Tunnel
        shell: bash
        run: |
          set -Eeuo pipefail

          # Quick Tunnels do not work when a local cloudflared
          # configuration file is present.
          rm -f "$HOME/.cloudflared/config.yml"
          rm -f "$HOME/.cloudflared/config.yaml"

          nohup cloudflared tunnel \
            --url "http://127.0.0.1:${NOVNC_PORT}" \
            --no-autoupdate \
            > "$RUNNER_TEMP/cloudflared.log" \
            2>&1 &

          CLOUDFLARED_PID=$!

          echo "CLOUDFLARED_PID=$CLOUDFLARED_PID" >> "$GITHUB_ENV"
          echo "$CLOUDFLARED_PID" > "$RUNNER_TEMP/cloudflared.pid"

          CF_URL=""

          for ATTEMPT in 1 2 3; do
            CF_URL="$(
              grep \
                -Eo \
                'https://[-a-zA-Z0-9]+\.trycloudflare\.com' \
                "$RUNNER_TEMP/cloudflared.log" |
              head -n 1 || true
            )"

            if [[ -n "$CF_URL" ]]; then
              echo "Cloudflare Quick Tunnel created:"
              echo "$CF_URL"
              break
            fi

            if ! kill -0 "$CLOUDFLARED_PID" 2>/dev/null; then
              echo "::error::cloudflared stopped unexpectedly."
              cat "$RUNNER_TEMP/cloudflared.log" || true
              exit 1
            fi

            echo "Attempt ${ATTEMPT}/3: waiting for tunnel URL..."
            sleep 10
          done

          if [[ -z "$CF_URL" ]]; then
            echo "::error::Cloudflare URL was not created after 3 attempts."
            cat "$RUNNER_TEMP/cloudflared.log" || true
            exit 1
          fi

          NOVNC_URL="${CF_URL}/vnc.html"

          NOVNC_URL+="?autoconnect=1"
          NOVNC_URL+="&reconnect=1"
          NOVNC_URL+="&reconnect_delay=1000"
          NOVNC_URL+="&resize=scale"
          NOVNC_URL+="&quality=${NOVNC_QUALITY}"
          NOVNC_URL+="&compression=${NOVNC_COMPRESSION}"
          NOVNC_URL+="&shared=1"
          NOVNC_URL+="&bell=0"
          NOVNC_URL+="&logging=warn"
          NOVNC_URL+="&keep_device_awake=1"
          NOVNC_URL+="&path=websockify"

          echo "CF_URL=$CF_URL" >> "$GITHUB_ENV"
          echo "NOVNC_URL=$NOVNC_URL" >> "$GITHUB_ENV"

          echo
          echo "Waiting for public noVNC page..."

          PUBLIC_READY=0

          for ATTEMPT in 1 2 3; do
            if curl \
              --silent \
              --fail \
              "${CF_URL}/vnc.html" \
              >/dev/null; then

              PUBLIC_READY=1
              echo "Public noVNC page is ready."
              break
            fi

            echo "Attempt ${ATTEMPT}/3: waiting for public page..."
            sleep 5
          done

          if [[ "$PUBLIC_READY" -ne 1 ]]; then
            echo "::warning::Public page was not ready after 3 attempts."
            echo "::warning::The URL may still become available shortly."
          fi

      # =========================================================
      # CONNECTION DETAILS
      # =========================================================
      - name: Print connection details
        shell: bash
        run: |
          set -Eeuo pipefail

          echo
          echo "======================================================"
          echo " MACOS BROWSER DESKTOP IS READY"
          echo "======================================================"
          echo
          echo "$NOVNC_URL"
          echo
          echo "VNC username : leave blank"
          echo "VNC password : value stored in VNC_PASSWORD"
          echo
          echo "Installer username : macadmin"
          echo "Installer password : MAC_ADMIN_PASSWORD secret"
          echo "                     or macadmin when secret is absent"
          echo
          echo "Resolution  : ${ACTIVE_RESOLUTION:-current}"
          echo "Quality     : ${NOVNC_QUALITY}/9"
          echo "Compression : ${NOVNC_COMPRESSION}/9"
          echo
          echo "Cancel the workflow when finished."
          echo "======================================================"

          {
            echo "## macOS browser desktop"
            echo
            echo "**[$NOVNC_URL]($NOVNC_URL)**"
            echo
            echo "### VNC login"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Username | Leave blank |"
            echo "| Password | Value stored in \`VNC_PASSWORD\` |"
            echo
            echo "### macOS installer authorization"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Username | \`macadmin\` |"
            echo "| Password | \`MAC_ADMIN_PASSWORD\` secret, or \`macadmin\` |"
            echo
            echo "### Performance"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Resolution | \`${ACTIVE_RESOLUTION:-current}\` |"
            echo "| noVNC quality | \`${NOVNC_QUALITY}/9\` |"
            echo "| noVNC compression | \`${NOVNC_COMPRESSION}/9\` |"
            echo
            echo "Cancel the workflow when finished."
          } >> "$GITHUB_STEP_SUMMARY"

      # =========================================================
      # KEEP SESSION ACTIVE
      # =========================================================
      - name: Keep macOS desktop running
        shell: bash
        run: |
          set -Eeuo pipefail

          caffeinate -dimsu &
          CAFFEINATE_PID=$!

          cleanup() {
            echo "Stopping temporary services..."

            kill "$CAFFEINATE_PID" 2>/dev/null || true

            if [[ -f "$RUNNER_TEMP/cloudflared.pid" ]]; then
              kill "$(
                cat "$RUNNER_TEMP/cloudflared.pid"
              )" 2>/dev/null || true
            fi

            if [[ -f "$RUNNER_TEMP/novnc.pid" ]]; then
              kill "$(
                cat "$RUNNER_TEMP/novnc.pid"
              )" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT INT TERM

          echo "macOS desktop is active:"
          echo "$NOVNC_URL"

          while true; do
            if ! kill -0 "$CLOUDFLARED_PID" 2>/dev/null; then
              echo "::error::Cloudflare Tunnel stopped."
              cat "$RUNNER_TEMP/cloudflared.log" || true
              exit 1
            fi

            if ! kill -0 "$NOVNC_PID" 2>/dev/null; then
              echo "::error::noVNC stopped."
              cat "$RUNNER_TEMP/novnc.log" || true
              exit 1
            fi

            echo
            echo "Desktop alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Resolution: ${ACTIVE_RESOLUTION:-current}"
            echo "URL: $NOVNC_URL"

            sleep 300
          done

name: macOS Desktop via Cloudflare

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-cloudflare-desktop
  cancel-in-progress: true

jobs:
  macos-desktop:
    runs-on: macos-14
    timeout-minutes: 180

    env:
      VNC_PORT: "5900"
      NOVNC_PORT: "6080"

    steps:
      - name: Show environment
        shell: bash
        run: |
          set -Eeuo pipefail

          sw_vers
          uname -m
          csrutil status || true
          whoami
          xcodebuild -version
          pgrep -laf WindowServer || true

      - name: Configure macOS VNC
        shell: bash
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${VNC_PASSWORD:-}" ]]; then
            echo "::error::VNC_PASSWORD secret is missing."
            exit 1
          fi

          echo "::add-mask::$VNC_PASSWORD"

          python3 <<'PY'
          import os
          import sys

          password = os.environ["VNC_PASSWORD"]

          try:
              raw = password.encode("ascii")
          except UnicodeEncodeError:
              print("::error::VNC_PASSWORD must contain ASCII characters only.")
              sys.exit(1)

          if len(raw) != 8:
              print(
                  "::error::VNC_PASSWORD must be exactly 8 ASCII characters. "
                  f"Received {len(raw)} bytes."
              )
              sys.exit(1)

          print("VNC password validation passed.")
          PY

          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          KICKSTART="/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart"
          SCREENSHARING_PLIST="/System/Library/LaunchDaemons/com.apple.screensharing.plist"

          sudo -n true

          if [[ ! -f "$TCC_DB" ]]; then
            echo "::error::TCC database not found."
            exit 1
          fi

          if [[ ! -x "$KICKSTART" ]]; then
            echo "::error::Apple Remote Desktop kickstart utility not found."
            exit 1
          fi

          echo "Testing TCC database access..."

          sudo sqlite3 "$TCC_DB" "
            BEGIN IMMEDIATE;
            UPDATE access
            SET auth_value = auth_value
            WHERE client = 'com.apple.screensharing.agent';
            ROLLBACK;
          "

          sudo launchctl enable system/com.apple.screensharing || true
          sudo launchctl bootstrap system "$SCREENSHARING_PLIST" 2>/dev/null || true

          EPOCH="$(date +%s)"

          echo "Installing Screen Sharing privacy permissions..."

          sudo sqlite3 "$TCC_DB" <<SQL
          BEGIN IMMEDIATE;

          DELETE FROM access
          WHERE client = 'com.apple.screensharing.agent'
            AND service IN (
              'kTCCServicePostEvent',
              'kTCCServiceScreenCapture'
            );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServicePostEvent',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServiceScreenCapture',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          COMMIT;
          SQL

          echo "Installed TCC permissions:"

          sudo sqlite3 -header -column "$TCC_DB" "
            SELECT service, client, auth_value, auth_reason
            FROM access
            WHERE client = 'com.apple.screensharing.agent';
          "

          sudo killall tccd 2>/dev/null || true
          killall tccd 2>/dev/null || true

          sleep 4

          echo "Stopping old Remote Management processes..."

          sudo "$KICKSTART" -deactivate || true
          sudo killall ARDAgent 2>/dev/null || true
          sudo killall ScreensharingAgent 2>/dev/null || true
          sudo killall screensharingd 2>/dev/null || true

          sleep 3

          echo "Activating Remote Management..."

          sudo "$KICKSTART" \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvnclegacy \
            -vnclegacy yes

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvncpw \
            -vncpw "$VNC_PASSWORD"

          echo "Writing legacy VNC preferences directly..."

          sudo defaults write \
            /Library/Preferences/com.apple.RemoteManagement \
            VNCLegacyConnectionsEnabled \
            -bool true

          sudo defaults write \
            /Library/Preferences/com.apple.RemoteManagement \
            ScreenSharingReqPermEnabled \
            -bool false

          sudo defaults write \
            /Library/Preferences/com.apple.RemoteManagement \
            VNCAlwaysStartOnConsole \
            -bool true

          ENCODED_PASSWORD="$(
            printf '%s\n' "$VNC_PASSWORD" |
            perl -we '
              BEGIN {
                @k = unpack "C*",
                  pack "H*", "1734516E8BA8C5E2FF1C39567390ADCA"
              }

              $_ = <>;
              chomp;
              s/^(.{8}).*/$1/;

              @p = unpack "C*", $_;

              foreach (@k) {
                printf "%02X", $_ ^ (shift @p || 0);
              }
            '
          )"

          printf '%s' "$ENCODED_PASSWORD" > "$RUNNER_TEMP/VNCSettings.txt"

          sudo install \
            -o root \
            -g wheel \
            -m 600 \
            "$RUNNER_TEMP/VNCSettings.txt" \
            /Library/Preferences/com.apple.VNCSettings.txt

          unset ENCODED_PASSWORD

          echo "Legacy VNC configuration:"

          sudo defaults read \
            /Library/Preferences/com.apple.RemoteManagement \
            VNCLegacyConnectionsEnabled || true

          sudo ls -l /Library/Preferences/com.apple.VNCSettings.txt

          echo "Restarting Screen Sharing..."

          sudo launchctl enable system/com.apple.screensharing || true
          sudo launchctl kickstart -k system/com.apple.screensharing 2>/dev/null || true

          sudo "$KICKSTART" -restart -agent -console || \
            sudo "$KICKSTART" -restart -agent || true

          sleep 12

          READY=0

          for attempt in {1..30}; do
            if nc -z 127.0.0.1 "$VNC_PORT"; then
              READY=1
              break
            fi

            echo "Waiting for VNC: ${attempt}/30"
            sleep 2
          done

          if [[ "$READY" -ne 1 ]]; then
            echo "::error::VNC did not start on port ${VNC_PORT}."
            sudo lsof -nP -iTCP -sTCP:LISTEN || true
            exit 1
          fi

          echo "VNC is listening."

          sudo lsof \
            -nP \
            -iTCP:"$VNC_PORT" \
            -sTCP:LISTEN || true

      - name: Verify VNC authentication types
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          import socket
          import sys

          def receive_exact(sock, length):
              data = bytearray()

              while len(data) < length:
                  chunk = sock.recv(length - len(data))

                  if not chunk:
                      raise RuntimeError("VNC connection closed unexpectedly")

                  data.extend(chunk)

              return bytes(data)

          with socket.create_connection(("127.0.0.1", 5900), timeout=10) as sock:
              banner = receive_exact(sock, 12)

              print("Server VNC banner:", repr(banner))

              if not banner.startswith(b"RFB "):
                  print("::error::Invalid VNC protocol banner.")
                  sys.exit(1)

              sock.sendall(b"RFB 003.008\n")

              count_data = receive_exact(sock, 1)
              count = count_data[0]

              if count == 0:
                  reason_length = int.from_bytes(
                      receive_exact(sock, 4),
                      byteorder="big"
                  )
                  reason = receive_exact(sock, reason_length).decode(
                      "utf-8",
                      errors="replace"
                  )

                  print(f"::error::VNC server rejected negotiation: {reason}")
                  sys.exit(1)

              security_types = list(receive_exact(sock, count))

              print("Advertised security types:", security_types)
              print("Type 2  = standard VNC password")
              print("Type 30 = Apple Remote Desktop authentication")

              if 2 not in security_types:
                  print(
                      "::error::Standard VNC authentication type 2 is missing. "
                      "Apple legacy VNC configuration did not apply."
                  )
                  sys.exit(1)

              print("Standard VNC password authentication is available.")
          PY

      - name: Verify desktop capture
        shell: bash
        run: |
          set -Eeuo pipefail

          screencapture -x "$RUNNER_TEMP/macos-desktop.png"

          if [[ ! -s "$RUNNER_TEMP/macos-desktop.png" ]]; then
            echo "::error::Desktop screenshot failed."
            exit 1
          fi

          ls -lh "$RUNNER_TEMP/macos-desktop.png"

      - name: Install and patch noVNC
        shell: bash
        run: |
          set -Eeuo pipefail

          NOVNC_DIR="$RUNNER_TEMP/noVNC"

          git clone \
            --depth 1 \
            --branch v1.7.0 \
            https://github.com/novnc/noVNC.git \
            "$NOVNC_DIR"

          echo "Patching noVNC to prefer standard VNC password authentication..."

          NOVNC_RFB="$NOVNC_DIR/core/rfb.js"

          NOVNC_RFB="$NOVNC_RFB" python3 <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["NOVNC_RFB"])
          source = path.read_text()

          old = """        this._rfbAuthScheme = -1;
                  for (let type of types) {
                      if (this._isSupportedSecurityType(type)) {
                          this._rfbAuthScheme = type;
                          break;
                      }
                  }
          """

          new = """        this._rfbAuthScheme = -1;

                  // Apple normally advertises ARD authentication first.
                  // Prefer classic password-only VNC when it is available.
                  if (types.includes(securityTypeVNCAuth)) {
                      this._rfbAuthScheme = securityTypeVNCAuth;
                  } else {
                      for (let type of types) {
                          if (this._isSupportedSecurityType(type)) {
                              this._rfbAuthScheme = type;
                              break;
                          }
                      }
                  }
          """

          if old not in source:
              raise SystemExit(
                  "::error::Unable to locate noVNC security-selection code."
              )

          path.write_text(source.replace(old, new, 1))

          print("noVNC authentication preference patched successfully.")
          PY

          grep -n \
            "Prefer classic password-only VNC" \
            "$NOVNC_RFB"

          echo "NOVNC_DIR=$NOVNC_DIR" >> "$GITHUB_ENV"

      - name: Start noVNC
        shell: bash
        run: |
          set -Eeuo pipefail

          nohup "$NOVNC_DIR/utils/novnc_proxy" \
            --listen "127.0.0.1:${NOVNC_PORT}" \
            --vnc "127.0.0.1:${VNC_PORT}" \
            > "$RUNNER_TEMP/novnc.log" \
            2>&1 &

          NOVNC_PID=$!

          echo "$NOVNC_PID" > "$RUNNER_TEMP/novnc.pid"
          echo "NOVNC_PID=$NOVNC_PID" >> "$GITHUB_ENV"

          for attempt in {1..30}; do
            if curl \
              --silent \
              --fail \
              "http://127.0.0.1:${NOVNC_PORT}/vnc.html" \
              >/dev/null; then
              echo "noVNC is ready."
              exit 0
            fi

            if ! kill -0 "$NOVNC_PID" 2>/dev/null; then
              echo "::error::noVNC stopped unexpectedly."
              cat "$RUNNER_TEMP/novnc.log" || true
              exit 1
            fi

            echo "Waiting for noVNC: ${attempt}/30"
            sleep 2
          done

          echo "::error::noVNC did not become ready."
          cat "$RUNNER_TEMP/novnc.log" || true
          exit 1

      - name: Install Cloudflare Tunnel
        shell: bash
        run: |
          set -Eeuo pipefail

          export HOMEBREW_NO_ENV_HINTS=1

          if ! command -v cloudflared >/dev/null 2>&1; then
            brew install cloudflared
          fi

          cloudflared --version

      - name: Start Cloudflare Quick Tunnel
        shell: bash
        run: |
          set -Eeuo pipefail

          nohup cloudflared tunnel \
            --url "http://127.0.0.1:${NOVNC_PORT}" \
            --no-autoupdate \
            > "$RUNNER_TEMP/cloudflared.log" \
            2>&1 &

          CLOUDFLARED_PID=$!

          echo "$CLOUDFLARED_PID" > "$RUNNER_TEMP/cloudflared.pid"
          echo "CLOUDFLARED_PID=$CLOUDFLARED_PID" >> "$GITHUB_ENV"

          CF_URL=""

          for attempt in {1..60}; do
            CF_URL="$(
              grep -Eo \
                'https://[-a-zA-Z0-9]+\.trycloudflare\.com' \
                "$RUNNER_TEMP/cloudflared.log" |
              head -n 1 || true
            )"

            if [[ -n "$CF_URL" ]]; then
              break
            fi

            if ! kill -0 "$CLOUDFLARED_PID" 2>/dev/null; then
              echo "::error::Cloudflare Tunnel stopped unexpectedly."
              cat "$RUNNER_TEMP/cloudflared.log" || true
              exit 1
            fi

            echo "Waiting for Cloudflare URL: ${attempt}/60"
            sleep 2
          done

          if [[ -z "$CF_URL" ]]; then
            echo "::error::Cloudflare Quick Tunnel URL was not created."
            cat "$RUNNER_TEMP/cloudflared.log" || true
            exit 1
          fi

          NOVNC_URL="${CF_URL}/vnc.html?autoconnect=true&resize=scale&path=websockify&logging=debug"

          echo "CF_URL=$CF_URL" >> "$GITHUB_ENV"
          echo "NOVNC_URL=$NOVNC_URL" >> "$GITHUB_ENV"

          echo "Cloudflare tunnel created:"
          echo "$NOVNC_URL"

      - name: Print connection details
        shell: bash
        run: |
          set -Eeuo pipefail

          echo
          echo "======================================================"
          echo " MACOS BROWSER DESKTOP"
          echo "======================================================"
          echo
          echo "$NOVNC_URL"
          echo
          echo "Username : leave blank"
          echo "Password : value of VNC_PASSWORD"
          echo
          echo "======================================================"

          {
            echo "## macOS browser desktop"
            echo
            echo "**[$NOVNC_URL]($NOVNC_URL)**"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Username | Leave blank |"
            echo "| Password | Value stored in \`VNC_PASSWORD\` |"
            echo "| Authentication | Standard VNC password |"
            echo
            echo "Cancel the workflow when finished."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Keep desktop running
        shell: bash
        run: |
          set -Eeuo pipefail

          caffeinate -dimsu &
          CAFFEINATE_PID=$!

          cleanup() {
            kill "$CAFFEINATE_PID" 2>/dev/null || true

            if [[ -f "$RUNNER_TEMP/cloudflared.pid" ]]; then
              kill "$(cat "$RUNNER_TEMP/cloudflared.pid")" 2>/dev/null || true
            fi

            if [[ -f "$RUNNER_TEMP/novnc.pid" ]]; then
              kill "$(cat "$RUNNER_TEMP/novnc.pid")" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT INT TERM

          echo "Desktop is active:"
          echo "$NOVNC_URL"

          while true; do
            if ! kill -0 "$CLOUDFLARED_PID" 2>/dev/null; then
              echo "::error::Cloudflare Tunnel stopped."
              cat "$RUNNER_TEMP/cloudflared.log" || true
              exit 1
            fi

            if ! kill -0 "$NOVNC_PID" 2>/dev/null; then
              echo "::error::noVNC stopped."
              cat "$RUNNER_TEMP/novnc.log" || true
              exit 1
            fi

            echo "Desktop alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            sleep 300
          done

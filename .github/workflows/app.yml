name: CF App Debug

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-debug
  cancel-in-progress: true

jobs:
  macos-desktop:
    runs-on: macos-14
    timeout-minutes: 180

    env:
      VNC_PORT: "5900"
      NOVNC_PORT: "6080"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show macOS information
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== macOS ==="
          sw_vers

          echo
          echo "=== Architecture ==="
          uname -m

          echo
          echo "=== SIP ==="
          csrutil status || true

          echo
          echo "=== User ==="
          whoami
          id

          echo
          echo "=== Console session ==="
          scutil <<< "show State:/Users/ConsoleUser" || true

          echo
          echo "=== WindowServer ==="
          pgrep -laf WindowServer || true

          echo
          echo "=== Xcode ==="
          xcodebuild -version
          xcode-select -p

      # -----------------------------------------------------------
      # ENABLE MACOS VNC AND SCREEN CAPTURE
      # -----------------------------------------------------------
      - name: Enable macOS Screen Sharing
        shell: bash
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${VNC_PASSWORD:-}" ]]; then
            echo "::error::VNC_PASSWORD GitHub secret is missing."
            exit 1
          fi

          echo "::add-mask::$VNC_PASSWORD"

          python3 <<'PY'
          import os
          import sys

          password = os.environ.get("VNC_PASSWORD", "")

          try:
              encoded = password.encode("ascii")
          except UnicodeEncodeError:
              print("::error::VNC_PASSWORD must contain ASCII characters only.")
              sys.exit(1)

          if len(encoded) != 8:
              print(
                  "::error::VNC_PASSWORD must be exactly 8 ASCII characters. "
                  f"Received {len(encoded)} bytes."
              )
              sys.exit(1)

          print("VNC password is valid.")
          PY

          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          KICKSTART="/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart"
          SCREENSHARING_PLIST="/System/Library/LaunchDaemons/com.apple.screensharing.plist"

          if [[ ! -f "$TCC_DB" ]]; then
            echo "::error::TCC database was not found."
            exit 1
          fi

          if [[ ! -x "$KICKSTART" ]]; then
            echo "::error::Apple Remote Desktop kickstart was not found."
            exit 1
          fi

          sudo -n true

          echo "Testing system TCC database..."
          sudo sqlite3 "$TCC_DB" "
            BEGIN IMMEDIATE;

            UPDATE access
            SET auth_value = auth_value
            WHERE client = 'com.apple.screensharing.agent';

            ROLLBACK;
          "

          echo "Loading Screen Sharing service..."
          sudo launchctl enable system/com.apple.screensharing || true

          sudo launchctl bootstrap \
            system \
            "$SCREENSHARING_PLIST" \
            2>/dev/null || true

          EPOCH="$(date +%s)"

          echo "Granting screen capture and remote-input permissions..."

          sudo sqlite3 "$TCC_DB" <<SQL
          BEGIN IMMEDIATE;

          DELETE FROM access
          WHERE client = 'com.apple.screensharing.agent'
            AND service IN (
              'kTCCServicePostEvent',
              'kTCCServiceScreenCapture'
            );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServicePostEvent',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServiceScreenCapture',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          COMMIT;
          SQL

          echo
          echo "=== TCC permissions ==="

          sudo sqlite3 \
            -header \
            -column \
            "$TCC_DB" "
              SELECT
                service,
                client,
                auth_value,
                auth_reason,
                last_modified
              FROM access
              WHERE client = 'com.apple.screensharing.agent';
            "

          echo
          echo "Restarting TCC..."

          sudo killall tccd 2>/dev/null || true
          killall tccd 2>/dev/null || true
          sleep 4

          echo "Stopping old Screen Sharing processes..."

          sudo "$KICKSTART" -deactivate || true
          sudo killall ARDAgent 2>/dev/null || true
          sudo killall ScreensharingAgent 2>/dev/null || true
          sudo killall screensharingd 2>/dev/null || true

          sleep 3

          echo "Activating Remote Management..."

          sudo "$KICKSTART" \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all

          echo "Enabling legacy VNC authentication..."

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvnclegacy \
            -vnclegacy yes

          echo "Setting VNC password..."

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvncpw \
            -vncpw "$VNC_PASSWORD"

          echo "Starting Screen Sharing..."

          sudo launchctl enable system/com.apple.screensharing || true
          sudo launchctl kickstart -k system/com.apple.screensharing || true
          sudo "$KICKSTART" -restart -agent || true

          sleep 10

          echo
          echo "Waiting for VNC port ${VNC_PORT}..."

          READY=0

          for attempt in {1..30}; do
            if nc -z 127.0.0.1 "$VNC_PORT"; then
              echo "VNC is listening on localhost:${VNC_PORT}."
              READY=1
              break
            fi

            echo "Attempt ${attempt}/30: waiting for VNC..."
            sleep 2
          done

          if [[ "$READY" -ne 1 ]]; then
            echo "::error::VNC did not start."

            ps aux |
              grep -Ei "ARDAgent|Screen.?sharing|AppleVNC" |
              grep -v grep || true

            sudo lsof -nP -iTCP -sTCP:LISTEN || true
            exit 1
          fi

          echo
          echo "=== VNC listener ==="

          sudo lsof \
            -nP \
            -iTCP:"$VNC_PORT" \
            -sTCP:LISTEN || true

      # -----------------------------------------------------------
      # VERIFY RAW LOCAL VNC
      # -----------------------------------------------------------
      - name: Verify local VNC protocol
        shell: bash
        run: |
          set -Eeuo pipefail

          nc -vz 127.0.0.1 "$VNC_PORT"

          BANNER="$(
            python3 - <<'PY'
          import socket

          with socket.create_connection(("127.0.0.1", 5900), timeout=5) as sock:
              print(sock.recv(32).decode("ascii", errors="replace").strip())
          PY
          )"

          echo "VNC protocol response: $BANNER"

          if [[ "$BANNER" != RFB* ]]; then
            echo "::error::Port 5900 did not return an RFB/VNC response."
            exit 1
          fi

      # -----------------------------------------------------------
      # INSTALL AND START NOVNC
      # -----------------------------------------------------------
      - name: Install noVNC
        shell: bash
        run: |
          set -Eeuo pipefail

          NOVNC_DIR="$RUNNER_TEMP/noVNC"

          git clone \
            --depth 1 \
            https://github.com/novnc/noVNC.git \
            "$NOVNC_DIR"

          echo "NOVNC_DIR=$NOVNC_DIR" >> "$GITHUB_ENV"

      - name: Start noVNC web server
        shell: bash
        run: |
          set -Eeuo pipefail

          nohup "$NOVNC_DIR/utils/novnc_proxy" \
            --listen "$NOVNC_PORT" \
            --vnc "127.0.0.1:${VNC_PORT}" \
            > "$RUNNER_TEMP/novnc.log" \
            2>&1 &

          NOVNC_PID=$!

          echo "NOVNC_PID=$NOVNC_PID" >> "$GITHUB_ENV"
          echo "$NOVNC_PID" > "$RUNNER_TEMP/novnc.pid"

          echo "Waiting for noVNC..."

          READY=0

          for attempt in {1..30}; do
            if curl \
              --silent \
              --fail \
              "http://127.0.0.1:${NOVNC_PORT}/vnc.html" \
              >/dev/null; then
              READY=1
              break
            fi

            if ! kill -0 "$NOVNC_PID" 2>/dev/null; then
              echo "::error::noVNC stopped unexpectedly."
              cat "$RUNNER_TEMP/novnc.log" || true
              exit 1
            fi

            echo "Attempt ${attempt}/30: waiting for noVNC..."
            sleep 2
          done

          if [[ "$READY" -ne 1 ]]; then
            echo "::error::noVNC did not start."
            cat "$RUNNER_TEMP/novnc.log" || true
            exit 1
          fi

          echo
          echo "noVNC is available locally:"
          echo "http://127.0.0.1:${NOVNC_PORT}/vnc.html"

          echo
          echo "=== noVNC log ==="
          cat "$RUNNER_TEMP/novnc.log" || true

      # -----------------------------------------------------------
      # INSTALL CLOUDFLARED
      # -----------------------------------------------------------
      - name: Install Cloudflare Tunnel
        shell: bash
        run: |
          set -Eeuo pipefail

          if command -v cloudflared >/dev/null 2>&1; then
            echo "cloudflared is already installed."
          else
            brew install cloudflared
          fi

          cloudflared --version

      # -----------------------------------------------------------
      # START FREE CLOUDFLARE QUICK TUNNEL
      # -----------------------------------------------------------
      - name: Start Cloudflare Quick Tunnel
        shell: bash
        run: |
          set -Eeuo pipefail

          nohup cloudflared tunnel \
            --url "http://127.0.0.1:${NOVNC_PORT}" \
            --no-autoupdate \
            > "$RUNNER_TEMP/cloudflared.log" \
            2>&1 &

          CLOUDFLARED_PID=$!

          echo "CLOUDFLARED_PID=$CLOUDFLARED_PID" >> "$GITHUB_ENV"
          echo "$CLOUDFLARED_PID" > "$RUNNER_TEMP/cloudflared.pid"

          echo "Waiting for Cloudflare Quick Tunnel URL..."

          CF_URL=""

          for attempt in {1..60}; do
            CF_URL="$(
              grep -Eo \
                'https://[-a-zA-Z0-9]+\.trycloudflare\.com' \
                "$RUNNER_TEMP/cloudflared.log" |
              head -n 1 || true
            )"

            if [[ -n "$CF_URL" ]]; then
              break
            fi

            if ! kill -0 "$CLOUDFLARED_PID" 2>/dev/null; then
              echo "::error::cloudflared stopped unexpectedly."
              cat "$RUNNER_TEMP/cloudflared.log" || true
              exit 1
            fi

            echo "Attempt ${attempt}/60: waiting for URL..."
            sleep 2
          done

          if [[ -z "$CF_URL" ]]; then
            echo "::error::Cloudflare did not provide a Quick Tunnel URL."

            echo
            echo "=== cloudflared log ==="
            cat "$RUNNER_TEMP/cloudflared.log" || true

            exit 1
          fi

          echo "CF_URL=$CF_URL" >> "$GITHUB_ENV"

          NOVNC_URL="${CF_URL}/vnc.html?autoconnect=true&resize=scale&path=websockify"

          echo "NOVNC_URL=$NOVNC_URL" >> "$GITHUB_ENV"

          echo
          echo "Cloudflare URL created: $CF_URL"

          echo
          echo "Waiting for public noVNC page..."

          PUBLIC_READY=0

          for attempt in {1..30}; do
            if curl \
              --silent \
              --fail \
              "${CF_URL}/vnc.html" \
              >/dev/null; then
              PUBLIC_READY=1
              break
            fi

            echo "Attempt ${attempt}/30: waiting for public URL..."
            sleep 3
          done

          if [[ "$PUBLIC_READY" -ne 1 ]]; then
            echo "::warning::The tunnel URL exists but the public page was not ready yet."
            echo "::warning::Open the URL manually after a few seconds."
          fi

      # -----------------------------------------------------------
      # VERIFY MACOS DESKTOP CAPTURE
      # -----------------------------------------------------------
      - name: Capture desktop screenshot
        shell: bash
        run: |
          set -Eeuo pipefail

          SCREENSHOT="$RUNNER_TEMP/macos-desktop.png"

          screencapture -x "$SCREENSHOT"

          if [[ ! -s "$SCREENSHOT" ]]; then
            echo "::error::Desktop screenshot was not created."
            exit 1
          fi

          ls -lh "$SCREENSHOT"
          file "$SCREENSHOT"

      - name: Upload desktop screenshot
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop
          path: ${{ runner.temp }}/macos-desktop.png
          if-no-files-found: error
          retention-days: 1

      # -----------------------------------------------------------
      # PRINT BROWSER CONNECTION DETAILS
      # -----------------------------------------------------------
      - name: Print browser connection details
        shell: bash
        run: |
          set -Eeuo pipefail

          echo
          echo "======================================================"
          echo " MACOS BROWSER DESKTOP IS READY"
          echo "======================================================"
          echo
          echo "Open this URL:"
          echo
          echo "$NOVNC_URL"
          echo
          echo "Password: value stored in VNC_PASSWORD"
          echo "Username: none"
          echo
          echo "No VNC client, Tailscale or ngrok is required."
          echo
          echo "======================================================"

          {
            echo "## macOS browser desktop"
            echo
            echo "Open the following address:"
            echo
            echo "**[$NOVNC_URL]($NOVNC_URL)**"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Username | None |"
            echo "| Password | Value stored in \`VNC_PASSWORD\` |"
            echo "| Transport | Cloudflare HTTPS + noVNC |"
            echo
            echo "Cancel the workflow when finished."
          } >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------
      # KEEP SESSION ACTIVE
      # -----------------------------------------------------------
      - name: Keep macOS desktop running
        shell: bash
        run: |
          set -Eeuo pipefail

          caffeinate -dimsu &
          CAFFEINATE_PID=$!

          cleanup() {
            echo "Stopping services..."

            kill "$CAFFEINATE_PID" 2>/dev/null || true

            if [[ -f "$RUNNER_TEMP/cloudflared.pid" ]]; then
              kill "$(cat "$RUNNER_TEMP/cloudflared.pid")" 2>/dev/null || true
            fi

            if [[ -f "$RUNNER_TEMP/novnc.pid" ]]; then
              kill "$(cat "$RUNNER_TEMP/novnc.pid")" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT INT TERM

          echo "macOS browser desktop is running."
          echo "URL: $NOVNC_URL"
          echo "Cancel the workflow when finished."

          while true; do
            if ! kill -0 "$CLOUDFLARED_PID" 2>/dev/null; then
              echo "::error::Cloudflare Tunnel stopped."

              echo
              echo "=== cloudflared log ==="
              cat "$RUNNER_TEMP/cloudflared.log" || true

              exit 1
            fi

            if ! kill -0 "$NOVNC_PID" 2>/dev/null; then
              echo "::error::noVNC stopped."

              echo
              echo "=== noVNC log ==="
              cat "$RUNNER_TEMP/novnc.log" || true

              exit 1
            fi

            echo "Desktop alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "URL: $NOVNC_URL"

            sleep 300
          done

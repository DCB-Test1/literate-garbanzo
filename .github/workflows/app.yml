name: Temporary macOS VNC via ngrok

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: temporary-macos-vnc-ngrok
  cancel-in-progress: true

jobs:
  macos-vnc:
    runs-on: macos-14
    timeout-minutes: 180

    env:
      VNC_PORT: "5900"

    steps:
      # -----------------------------------------------------------
      # CHECKOUT
      # -----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # RUNNER DETAILS
      # -----------------------------------------------------------
      - name: Show macOS environment
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== macOS ==="
          sw_vers

          echo
          echo "=== Architecture ==="
          uname -m

          echo
          echo "=== SIP ==="
          csrutil status || true

          echo
          echo "=== Current user ==="
          whoami
          id

          echo
          echo "=== Console session ==="
          scutil <<< "show State:/Users/ConsoleUser" || true

          echo
          echo "=== WindowServer ==="
          pgrep -laf WindowServer || true

          echo
          echo "=== Xcode ==="
          xcodebuild -version
          xcode-select -p

          echo
          echo "=== Xcode applications ==="
          find /Applications \
            -maxdepth 1 \
            -type d \
            -name 'Xcode*.app' \
            -print \
            | sort

      # -----------------------------------------------------------
      # ENABLE VNC + TCC PERMISSIONS
      # -----------------------------------------------------------
      - name: Configure macOS Screen Sharing and VNC
        shell: bash
        env:
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${VNC_PASSWORD:-}" ]]; then
            echo "::error::VNC_PASSWORD GitHub secret is missing."
            exit 1
          fi

          echo "::add-mask::$VNC_PASSWORD"

          python3 <<'PY'
          import os
          import sys

          password = os.environ.get("VNC_PASSWORD", "")

          try:
              raw = password.encode("ascii")
          except UnicodeEncodeError:
              print("::error::VNC_PASSWORD must contain ASCII characters only.")
              sys.exit(1)

          if len(raw) != 8:
              print(
                  "::error::VNC_PASSWORD must be exactly 8 ASCII characters. "
                  f"Received {len(raw)} bytes."
              )
              sys.exit(1)

          print("VNC password validation passed.")
          PY

          sudo -n true

          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          KICKSTART="/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart"
          SCREENSHARING_PLIST="/System/Library/LaunchDaemons/com.apple.screensharing.plist"

          if [[ ! -f "$TCC_DB" ]]; then
            echo "::error::TCC database not found: $TCC_DB"
            exit 1
          fi

          if [[ ! -x "$KICKSTART" ]]; then
            echo "::error::Apple Remote Desktop kickstart was not found."
            exit 1
          fi

          echo
          echo "=== Testing system TCC database ==="

          sudo sqlite3 "$TCC_DB" "
            BEGIN IMMEDIATE;

            UPDATE access
            SET auth_value = auth_value
            WHERE client = 'com.apple.screensharing.agent';

            ROLLBACK;
          "

          echo "System TCC database is writable."

          echo
          echo "=== Loading Screen Sharing service ==="

          sudo launchctl enable system/com.apple.screensharing || true

          sudo launchctl bootstrap \
            system \
            "$SCREENSHARING_PLIST" \
            2>/dev/null || true

          EPOCH="$(date +%s)"

          echo
          echo "=== Granting Screen Sharing TCC permissions ==="

          sudo sqlite3 "$TCC_DB" <<SQL
          BEGIN IMMEDIATE;

          DELETE FROM access
          WHERE client = 'com.apple.screensharing.agent'
            AND service IN (
              'kTCCServicePostEvent',
              'kTCCServiceScreenCapture'
            );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServicePostEvent',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          INSERT INTO access (
            service,
            client,
            client_type,
            auth_value,
            auth_reason,
            auth_version,
            indirect_object_identifier_type,
            flags,
            last_modified,
            last_reminded
          ) VALUES (
            'kTCCServiceScreenCapture',
            'com.apple.screensharing.agent',
            0,
            2,
            4,
            1,
            0,
            0,
            ${EPOCH},
            ${EPOCH}
          );

          COMMIT;
          SQL

          echo
          echo "=== Installed TCC entries ==="

          sudo sqlite3 \
            -header \
            -column \
            "$TCC_DB" "
              SELECT
                service,
                client,
                client_type,
                auth_value,
                auth_reason,
                last_modified
              FROM access
              WHERE client = 'com.apple.screensharing.agent';
            "

          echo
          echo "=== Restarting TCC daemons ==="

          sudo killall tccd 2>/dev/null || true
          killall tccd 2>/dev/null || true
          sleep 4

          echo
          echo "=== Stopping existing Remote Management processes ==="

          sudo "$KICKSTART" -deactivate || true
          sudo killall ARDAgent 2>/dev/null || true
          sudo killall ScreensharingAgent 2>/dev/null || true
          sudo killall screensharingd 2>/dev/null || true
          sleep 3

          echo
          echo "=== Activating Remote Management ==="

          sudo "$KICKSTART" \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all

          echo
          echo "=== Enabling legacy VNC authentication ==="

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvnclegacy \
            -vnclegacy yes

          echo
          echo "=== Setting VNC password ==="

          sudo "$KICKSTART" \
            -configure \
            -clientopts \
            -setvncpw \
            -vncpw "$VNC_PASSWORD"

          echo
          echo "=== Starting Screen Sharing ==="

          sudo launchctl enable system/com.apple.screensharing || true
          sudo launchctl kickstart -k system/com.apple.screensharing || true
          sudo "$KICKSTART" -restart -agent || true

          sleep 10

          echo
          echo "=== Waiting for VNC port ${VNC_PORT} ==="

          READY=0

          for attempt in {1..30}; do
            if nc -z 127.0.0.1 "$VNC_PORT"; then
              echo "VNC is listening on localhost:${VNC_PORT}."
              READY=1
              break
            fi

            echo "Attempt ${attempt}/30: VNC not ready."
            sleep 2
          done

          if [[ "$READY" -ne 1 ]]; then
            echo "::error::VNC did not start."

            echo
            echo "=== Processes ==="
            ps aux |
              grep -Ei "ARDAgent|Screen.?sharing|AppleVNC" |
              grep -v grep || true

            echo
            echo "=== Ports ==="
            sudo lsof -nP -iTCP -sTCP:LISTEN || true

            exit 1
          fi

          echo
          echo "=== VNC processes ==="

          ps aux |
            grep -Ei "ARDAgent|Screen.?sharing|AppleVNC" |
            grep -v grep || true

          echo
          echo "=== Port 5900 listener ==="

          sudo lsof \
            -nP \
            -iTCP:"$VNC_PORT" \
            -sTCP:LISTEN || true

      # -----------------------------------------------------------
      # VERIFY LOCAL VNC HANDSHAKE
      # -----------------------------------------------------------
      - name: Verify local VNC protocol
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== Port test ==="
          nc -vz 127.0.0.1 "$VNC_PORT"

          echo
          echo "=== VNC protocol banner ==="

          BANNER="$(
            python3 - <<'PY'
          import socket

          with socket.create_connection(("127.0.0.1", 5900), timeout=5) as sock:
              print(sock.recv(32).decode("ascii", errors="replace").strip())
          PY
          )"

          echo "$BANNER"

          if [[ "$BANNER" != RFB* ]]; then
            echo "::error::Port 5900 did not return an RFB/VNC protocol banner."
            exit 1
          fi

          echo "Local VNC protocol is responding."

      # -----------------------------------------------------------
      # INSTALL NGROK
      # -----------------------------------------------------------
      - name: Install ngrok
        shell: bash
        run: |
          set -Eeuo pipefail

          if command -v ngrok >/dev/null 2>&1; then
            echo "ngrok is already installed."
          else
            brew install ngrok/ngrok/ngrok
          fi

          echo
          echo "=== ngrok version ==="
          ngrok version

      # -----------------------------------------------------------
      # START PUBLIC NGROK TCP TUNNEL
      # -----------------------------------------------------------
      - name: Start ngrok TCP tunnel
        shell: bash
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          set -Eeuo pipefail

          if [[ -z "${NGROK_AUTHTOKEN:-}" ]]; then
            echo "::error::NGROK_AUTHTOKEN GitHub secret is missing."
            exit 1
          fi

          echo "::add-mask::$NGROK_AUTHTOKEN"

          echo "Adding ngrok authtoken..."
          ngrok config add-authtoken "$NGROK_AUTHTOKEN"

          echo
          echo "Starting ngrok TCP tunnel:"
          echo "public TCP endpoint -> 127.0.0.1:${VNC_PORT}"

          nohup ngrok tcp "127.0.0.1:${VNC_PORT}" \
            --log=stdout \
            --log-format=json \
            > "$RUNNER_TEMP/ngrok.log" \
            2>&1 &

          NGROK_PID=$!

          echo "NGROK_PID=$NGROK_PID" >> "$GITHUB_ENV"
          echo "$NGROK_PID" > "$RUNNER_TEMP/ngrok.pid"

          echo
          echo "Waiting for the ngrok local API..."

          API_READY=0

          for attempt in {1..30}; do
            if curl \
              --silent \
              --fail \
              http://127.0.0.1:4040/api/tunnels \
              >/dev/null; then
              API_READY=1
              break
            fi

            if ! kill -0 "$NGROK_PID" 2>/dev/null; then
              echo "::error::ngrok stopped before creating the tunnel."
              cat "$RUNNER_TEMP/ngrok.log" || true
              exit 1
            fi

            echo "Attempt ${attempt}/30: waiting for ngrok..."
            sleep 2
          done

          if [[ "$API_READY" -ne 1 ]]; then
            echo "::error::ngrok API did not become ready."
            cat "$RUNNER_TEMP/ngrok.log" || true
            exit 1
          fi

          NGROK_URL="$(
            curl \
              --silent \
              http://127.0.0.1:4040/api/tunnels |
            python3 -c '
          import json
          import sys

          payload = json.load(sys.stdin)

          for tunnel in payload.get("tunnels", []):
              url = tunnel.get("public_url", "")
              if url.startswith("tcp://"):
                  print(url)
                  break
          '
          )"

          if [[ -z "$NGROK_URL" ]]; then
            echo "::error::ngrok did not return a TCP public URL."

            echo
            echo "=== ngrok API response ==="
            curl \
              --silent \
              http://127.0.0.1:4040/api/tunnels || true

            echo
            echo "=== ngrok log ==="
            cat "$RUNNER_TEMP/ngrok.log" || true

            exit 1
          fi

          NGROK_ADDRESS="${NGROK_URL#tcp://}"
          NGROK_HOST="${NGROK_ADDRESS%:*}"
          NGROK_PORT="${NGROK_ADDRESS##*:}"

          echo "NGROK_URL=$NGROK_URL" >> "$GITHUB_ENV"
          echo "NGROK_ADDRESS=$NGROK_ADDRESS" >> "$GITHUB_ENV"
          echo "NGROK_HOST=$NGROK_HOST" >> "$GITHUB_ENV"
          echo "NGROK_PORT=$NGROK_PORT" >> "$GITHUB_ENV"

          echo
          echo "ngrok tunnel created successfully."
          echo "Public endpoint: $NGROK_ADDRESS"

      # -----------------------------------------------------------
      # OPTIONAL FLUTTER PREPARATION
      # -----------------------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter project
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        shell: bash
        run: |
          set -Eeuo pipefail

          flutter --version
          flutter pub get

          if [[ -f "$GITHUB_WORKSPACE/ios/Podfile" ]]; then
            cd "$GITHUB_WORKSPACE/ios"
            pod install --repo-update
          fi

      # -----------------------------------------------------------
      # OPEN XCODE + SIMULATOR
      # -----------------------------------------------------------
      - name: Open Xcode and Simulator
        shell: bash
        run: |
          set -Eeuo pipefail

          DEVELOPER_DIR_PATH="$(xcode-select -p)"
          XCODE_APP="$(dirname "$(dirname "$DEVELOPER_DIR_PATH")")"
          SIMULATOR_APP="${DEVELOPER_DIR_PATH}/Applications/Simulator.app"

          echo "Xcode application: $XCODE_APP"
          echo "Simulator application: $SIMULATOR_APP"

          open -a Finder "$GITHUB_WORKSPACE" || true

          if [[ -d "$GITHUB_WORKSPACE/ios/Runner.xcworkspace" ]]; then
            echo "Opening Runner.xcworkspace..."
            open "$GITHUB_WORKSPACE/ios/Runner.xcworkspace" || true

          elif [[ -d "$GITHUB_WORKSPACE/ios/Runner.xcodeproj" ]]; then
            echo "Opening Runner.xcodeproj..."
            open "$GITHUB_WORKSPACE/ios/Runner.xcodeproj" || true

          elif [[ -d "$XCODE_APP" ]]; then
            echo "Opening Xcode application..."
            open "$XCODE_APP" || true
          fi

          if [[ -d "$SIMULATOR_APP" ]]; then
            open "$SIMULATOR_APP" || true
          fi

          sleep 15

      # -----------------------------------------------------------
      # VERIFY DESKTOP CAPTURE
      # -----------------------------------------------------------
      - name: Capture desktop verification screenshot
        shell: bash
        run: |
          set -Eeuo pipefail

          SCREENSHOT="$RUNNER_TEMP/macos-vnc-desktop.png"

          screencapture -x "$SCREENSHOT"

          if [[ ! -s "$SCREENSHOT" ]]; then
            echo "::error::Desktop screenshot was not created."
            exit 1
          fi

          ls -lh "$SCREENSHOT"
          file "$SCREENSHOT"

      - name: Upload desktop verification screenshot
        uses: actions/upload-artifact@v4
        with:
          name: macos-vnc-desktop
          path: ${{ runner.temp }}/macos-vnc-desktop.png
          if-no-files-found: error
          retention-days: 1

      # -----------------------------------------------------------
      # PRINT NGROK/VNC DETAILS
      # -----------------------------------------------------------
      - name: Print VNC connection details
        shell: bash
        run: |
          set -Eeuo pipefail

          echo
          echo "=================================================="
          echo " TEMPORARY MACOS VNC VIA NGROK IS READY"
          echo "=================================================="
          echo "Server       : ${NGROK_ADDRESS}"
          echo "Host         : ${NGROK_HOST}"
          echo "Port         : ${NGROK_PORT}"
          echo "Protocol     : VNC"
          echo "Username     : leave blank"
          echo "Password     : value of VNC_PASSWORD secret"
          echo "=================================================="
          echo
          echo "TigerVNC command:"
          echo
          echo "vncviewer -SecurityTypes=VncAuth ${NGROK_HOST}::${NGROK_PORT}"
          echo
          echo "Remmina server:"
          echo
          echo "${NGROK_HOST}:${NGROK_PORT}"
          echo

          {
            echo "## Temporary macOS VNC via ngrok"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Server | \`${NGROK_ADDRESS}\` |"
            echo "| Host | \`${NGROK_HOST}\` |"
            echo "| Port | \`${NGROK_PORT}\` |"
            echo "| Protocol | VNC |"
            echo "| Username | Leave blank |"
            echo "| Password | Value stored in \`VNC_PASSWORD\` |"
            echo
            echo "### TigerVNC"
            echo
            echo "\`\`\`bash"
            echo "vncviewer -SecurityTypes=VncAuth ${NGROK_HOST}::${NGROK_PORT}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------
      # KEEP SESSION RUNNING
      # -----------------------------------------------------------
      - name: Keep macOS VNC session running
        shell: bash
        run: |
          set -Eeuo pipefail

          caffeinate -dimsu &
          CAFFEINATE_PID=$!

          cleanup() {
            echo "Stopping keep-alive processes..."

            kill "$CAFFEINATE_PID" 2>/dev/null || true

            if [[ -f "$RUNNER_TEMP/ngrok.pid" ]]; then
              kill "$(cat "$RUNNER_TEMP/ngrok.pid")" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT INT TERM

          echo "Temporary macOS VNC session is active."
          echo "Cancel the GitHub workflow when finished."
          echo

          while true; do
            echo "VNC alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "ngrok endpoint: ${NGROK_ADDRESS}"

            if ! kill -0 "$NGROK_PID" 2>/dev/null; then
              echo "::error::ngrok process stopped unexpectedly."
              cat "$RUNNER_TEMP/ngrok.log" || true
              exit 1
            fi

            sleep 300
          done
